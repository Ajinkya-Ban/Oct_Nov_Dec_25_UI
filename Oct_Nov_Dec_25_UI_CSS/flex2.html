<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .box {
        width: 600px;
        height: 300px;
        border: 1px solid #000;
        background-color: purple;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .sub-box {
        width: 100px;
        height: 100px;
        background-color: yellow;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="sub-box"></div>
    </div>
  </body>
</html>
