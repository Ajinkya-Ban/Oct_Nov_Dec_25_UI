<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Slider</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
        font-family: "Montserrat", sans-serif;
      }

      body {
        background: #111;
      }

      .container {
        width: 90%;
        margin: auto;
      }

      .slider {
        width: 100%;
        height: 600px;
        background:
          linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.6)),
          url(./imgs/road.jpeg);
        background-size: cover;
        background-position: center;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
      }

      .text-area {
        width: 600px;
        padding: 30px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        text-align: center;
        color: #fff;
        transition: 0.4s ease;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }

      .text-area:hover {
        transform: scale(1.05);
        background: rgba(255, 255, 255, 0.2);
      }

      .text-area p {
        font-size: 1.3rem;
        line-height: 1.8;
        margin-bottom: 20px;
      }

      .btn {
        display: inline-block;
        padding: 10px 25px;
        background: #ff7a18;
        color: #fff;
        border-radius: 30px;
        text-decoration: none;
        font-weight: 600;
        transition: 0.3s;
      }

      .btn:hover {
        background: #ff3c00;
        transform: translateY(-3px);
        box-shadow: 0 5px 15px rgba(255, 60, 0, 0.5);
      }

      @media (max-width: 768px) {
        .text-area {
          width: 90%;
        }
        .text-area p {
          font-size: 1rem;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="slider">
        <div class="text-area">
          <p>
            Life is simple: wake up, think about vadapav, eat vadapav, share
            vadapav, dream vadapav, repeat daily, because happiness comes
            wrapped in pav with spicy chutney and zero regrets at all.
          </p>

          <a href="#" class="btn">Explore More</a>
        </div>
      </div>
    </div>
  </body>
</html>
