<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
        font-family: "Montserrat", sans-serif;
      }
      .container {
        width: 80%;
        min-height: 100px;
        margin: auto;
        border: 1px solid #000;
      }
      .slider {
        width: 100%;
        height: 600px;
        background-image: url(./imgs/road.jpeg);
        background-size: cover;
        background-position: center center;
        background-repeat: no-repeat;
        position: relative;
      }
      .text p {
        color: white;
        font-size: 2.4vmax;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
      }
      .text-area {
        width: 600px;
        height: 300px;
        /* border: 1px solid white; */
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background-color: rgba(255, 255, 255, 0.3);
        backdrop-filter: blur(2px), brightness(140%);
        border-radius: 20px;
      }
      .text-area p {
        color: black;
        font-size: 1.9vmax;
        text-align: center;
        padding: 10px;
        margin-top: 50px;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="slider">
        <div class="text-area">
          <p>
            Life is simple: wake up, think about vadapav, eat vadapav, share
            vadapav, dream vadapav, repeat daily, because happiness comes
            wrapped in pav with spicy chutney and zero regrets at all.
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
