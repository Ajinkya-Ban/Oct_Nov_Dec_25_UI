<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      .box {
        width: 80%;
        height: 200px;
        border: 1px solid #000;
        margin: auto;
        /* background-color: rgba(255, 185, 255, 0.8); */
        background-image: linear-gradient(45deg, #ff8c00, white, green);
      }
      .box h1 {
        text-align: center;
        line-height: 200px;
        font-size: 60px;
        font-weight: bolder;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>INDIA</h1>
    </div>
  </body>
</html>
