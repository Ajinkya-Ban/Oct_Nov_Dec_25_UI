<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      .main-box {
        width: 600px;
        height: 300px;
        border: 5px solid #000;
        margin: auto;
        position: relative;
      }
      .main-box .small-box {
        width: 100px;
        height: 100px;
        background-color: royalblue;
        position: absolute;
        /* top: 50%;
        left: 50%;
        transform: translate(-50%, -50%); */
        border-radius: 50%;
        top: 0;
        left: 100px;
      }
    </style>
  </head>
  <body>
    <div class="main-box">
      <div class="small-box"></div>
    </div>
  </body>
</html>
