<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      .container {
        width: 80%;
        min-height: 100px;
        border: 1px solid #000;
        margin: auto;
      }
      .row {
        width: 100%;
        min-height: 200px;
        padding: 10px;
      }
      .row .photo {
        width: 32.5%;
        height: 300px;
        float: left;
        margin-left: 10px;
        position: relative;
      }
      .photo img {
        width: 100%;
        object-fit: fill;
        height: 300px;
        border-radius: 10px;
      }
      .clearfix::after {
        content: "";
        clear: both;
        display: block;
      }
      .offer img {
        position: absolute;
        width: 50px;
        height: 50px;
        top: 0;
        right: 0;
      }
      .ordernow img {
        width: 80px;
        height: 80px;
        position: absolute;
        bottom: 0;
        left: 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="row clearfix">
        <div class="photo">
          <img src="./imgs/Vada_Pav.jpg" />

          <div class="offer">

          </div>

          <div class="ordernow">
            <!-- <a href="background1.html"> <img src="./imgs/oderbtn1.png" /></a> -->
            <img src="./imgs/oderbtn1.png" />

        </div>

        <div class="photo">

          <div class="ordernow">

            <img src="./imgs/oderbtn1.png" />
          </div>
        </div>

        <div class="photo">
          <img src="./imgs/Vada_Pav.jpg" />
          <div class="offer">
            <img src="./imgs/dis-removebg-preview.png" />
          </div>

          <div class="ordernow">
            <!-- <a href="background1.html"> <img src="./imgs/oderbtn1.png" /></a> -->
