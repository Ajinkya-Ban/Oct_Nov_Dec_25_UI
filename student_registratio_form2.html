<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Register Form</title>
    <link rel="stylesheet" href="./css/student_reg.css" />
  </head>
  <body>
    <div class="container">
      <h1>Student Register Form</h1>
      <div class="form-data">
        <form>
          <table>
            <tr>
              <td><label for="name">Enter Firstname</label></td>
              <td>
                <input
                  type="text"
                  id="name"
                  name="name"
                  placeholder="Enter name here"
                  autocomplete="off"
                />
                <span class="message">(max 30 character a-z to A-Z)</span>
              </td>
            </tr>

            <tr>
              <td><label for="lname">Enter Lastname</label></td>
              <td>
                <input
                  type="text"
                  id="lname"
                  name="lname"
                  placeholder="Enter lastname here"
                  autocomplete="off"
                />
                <span class="message">(max 30 character a-z to A-Z)</span>
              </td>
            </tr>

            <tr>
              <td><label for="date">Select birthdate</label></td>
              <td>
                <select id="day" name="day" class="day">
                  <option value="day">---Day---</option>
                  <option>1</option>
                  <option>2</option>
                  <option>3</option>
                  <option>4</option>
                  <option>5</option>
                </select>

                <select id="month" name="month" class="month">
                  <option value="month">---Month---</option>
                  <option>jan</option>
                  <option>feb</option>
                  <option>march</option>
                  <option>april</option>
                  <option>may</option>
                </select>

                <select id="year" name="year" class="year">
                  <option value="year">---Year---</option>
                  <option>2001</option>
                  <option>2002</option>
                  <option>2003</option>
                  <option>2004</option>
                  <option>2005</option>
                </select>
              </td>
            </tr>

            <tr>
              <td><label for="email">Enter Email Address</label></td>
              <td>
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="Email Address"
                  autocomplete="off"
                />
                <span class="message">(Enter proper email address)</span>
              </td>
            </tr>
            <tr>
              <td>
                <label for="qual">Qualification</label>
              </td>
              <td>
                <table class="qual">
                  <tr>
                    <th>Sr.No</th>
                    <th>Examination</th>
                    <th>Board</th>
                    <th>Percentage</th>
                    <th>Year of Passing</th>
                  </tr>
                  <tr>
                    <td>1</td>
                    <td>Class X</td>
                    <td>
                      <input type="text" />
                    </td>
                    <td>
                      <input type="text" />
                    </td>
                    <td>
                      <input type="text" />
                    </td>
                  </tr>

                  <tr>
                    <td>2</td>
                    <td>Class XII</td>
                    <td>
                      <input type="text" />
                    </td>
                    <td>
                      <input type="text" />
                    </td>
                    <td>
                      <input type="text" />
                    </td>
                  </tr>
                  <tr>
                    <td>3</td>
                    <td>Graduation</td>
                    <td>
                      <input type="text" />
                    </td>
                    <td>
                      <input type="text" />
                    </td>
                    <td>
                      <input type="text" />
                    </td>
                  </tr>
                  <tr>
                    <td>4</td>
                    <td>Masters</td>
                    <td>
                      <input type="text" />
                    </td>
                    <td>
                      <input type="text" />
                    </td>
                    <td>
                      <input type="text" />
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td></td>
              <td>
                <button class="reg">Register</button>
                <button class="clear">Clear Data</button>
              </td>
            </tr>
          </table>
        </form>
      </div>
    </div>
  </body>
</html>
