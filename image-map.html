<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .box {
        width: 600px;
        min-height: 100px;
        margin: auto;
        border: 1px solid #000;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <img src="./imgs/workplace.jpg" usemap="#mymap" />
      <map name="mymap">
        <area
          shape="rect"
          coords="37,50,269,344"
          href="https://www.apple.com/in/macbook-pro/"
          target="_blank"
          title="Apple MacBook"
        />
        <area
          shape="rect"
          coords="291,172,330,244"
          href="https://www.apple.com/in/shop/buy-iphone/iphone-16"
          target="_blank"
          title="IPhone 16"
        />
        <area shape="circle" coords="341,300,43" href="" target="" title="" />
      </map>
    </div>
  </body>
</html>
